function App(){
  const saved=load();
  const [D,setD]=useState(()=>{
    const s=load();
    if(s){if(!s.creds)s.creds=[];if(!s.driveFolders)s.driveFolders={};if(!s.calendarIds)s.calendarIds=DEFAULTS.calendarIds;if(!s.calClientMap)s.calClientMap=DEFAULTS.calClientMap;return s;}
    return JSON.parse(JSON.stringify(DEFAULTS));
  });
  const [sec,setSec]=useState("overview");
  const [pinOk,setPinOk]=useState(false);
  const [toast,setToast]=useState(null);
  const [modal,setModal]=useState(null);
  const [pin,setPin]=useState({show:false,mode:"unlock",buf:"",temp:"",err:"",hint:"",cb:null});
  const [cal,setCal]=useState(()=>{const n=new Date();return{year:n.getFullYear(),month:n.getMonth(),sel:n.toISOString().slice(0,10)};});
  const [nid,setNid]=useState(null);
  const [ntitle,setNtitle]=useState("");
  const [nbody,setNbody]=useState("");
  const [syncSt,setSyncSt]=useState("idle");
  const ntRef=useRef(null);
  const ttRef=useRef(null);
  const syncRef=useRef(null);

  useEffect(()=>{save(D);},[D]);

  const toast_=useCallback(msg=>{
    setToast(msg);
    clearTimeout(ttRef.current);
    ttRef.current=setTimeout(()=>setToast(null),2400);
  },[]);

  const cn=id=>D.clients.find(c=>c.id===id)?.name||"General";

  // Calendar sync
  const syncCal=useCallback(async()=>{
    if(window.location.protocol==="file:"){setSyncSt("file");return;}
    setSyncSt("syncing");
    try{
      const now=new Date();
      const start=now.toISOString();
      const end=new Date(now.getTime()+30*24*60*60*1000).toISOString();
      const calIds=(D.calendarIds||DEFAULTS.calendarIds).join(", ");
      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-6",
          max_tokens:2000,
          system:"You are a calendar sync assistant. Fetch events from multiple Google calendars. Return ONLY a JSON array, no markdown. Each item: {id,title,date(YYYY-MM-DD),time(HH:MM 24h or empty),note(empty if none),calendarId}. Max 100 events. If none, return [].",
          messages:[{role:"user",content:"List all events from "+start+" to "+end+" from calendars: "+calIds+". Return flat JSON array."}],
          mcp_servers:[{type:"url",url:"https://calendarmcp.googleapis.com/mcp/v1",name:"google-calendar"}]
        })
      });
      if(!resp.ok)throw new Error("API "+resp.status);
      const data=await resp.json();
      const text=data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
      const clean=text.replace(/```json|```/g,"").trim();
      const evts=JSON.parse(clean);
      if(!Array.isArray(evts))throw new Error("Bad format");
      const calMap=D.calClientMap||DEFAULTS.calClientMap;
      setD(d=>{
        const manual=d.events.filter(e=>!e.fromGcal);
        const seen=new Set();
        const gcal=evts.filter(e=>{if(seen.has(e.id))return false;seen.add(e.id);return true;})
          .map(e=>({id:"gcal-"+e.id,title:e.title,date:e.date,time:e.time||"",note:e.note||"",fromGcal:true,calendarId:e.calendarId||null,clientId:calMap[e.calendarId]||null}));
        return {...d,events:[...manual,...gcal]};
      });
      setSyncSt("synced");
      toast_("Calendar synced - "+evts.length+" events loaded");
    }catch(e){
      console.error("Calendar sync:",e.message||e);
      setSyncSt("error");
      // Don't show error toast - sync requires GitHub Pages hosting
    }
  },[D,toast_]);

  useEffect(()=>{
    const isLocal = window.location.protocol==="file:" || window.location.hostname==="localhost";
    if(isLocal){setSyncSt("file");return;}
    syncCal();
    syncRef.current=setInterval(syncCal,30*60*1000);
    return()=>clearInterval(syncRef.current);
  },[]);

  // Navigation
  const go=s=>{
    if(s!=="credentials")setPinOk(false);
    setSec(s);
    if(s==="notes"&&!nid&&D.notes.length>0){const n=D.notes[0];setNid(n.id);setNtitle(n.title);setNbody(n.content);}
  };

  const goCreds=()=>{
    if(pinOk){go("credentials");return;}
    const sp=localStorage.getItem(PK);
    if(!sp)setPin({show:true,mode:"set-new",buf:"",temp:"",err:"",hint:"Choose a 4-digit PIN to protect credentials.",cb:()=>{setPinOk(true);setSec("credentials");}});
    else setPin({show:true,mode:"unlock",buf:"",temp:"",err:"",hint:"",cb:()=>{setPinOk(true);setSec("credentials");}});
  };

  const pinKey=k=>{
    setPin(p=>{
      if(p.buf.length>=4)return p;
      const buf=p.buf+k;
      if(buf.length===4){
        setTimeout(()=>{
          setPin(pp=>{
            const stored=localStorage.getItem(PK);
            if(pp.mode==="unlock"){
              if(buf===stored){setTimeout(()=>{if(pp.cb)pp.cb();},50);return{...pp,show:false,buf:""};}
              return{...pp,buf:"",err:"Incorrect PIN. Try again."};
            }else if(pp.mode==="set-new"){
              return{...pp,buf:"",temp:buf,mode:"confirm",err:"",hint:"Enter the same PIN again."};
            }else{
              if(buf===pp.temp){localStorage.setItem(PK,buf);setTimeout(()=>{toast_("PIN set");if(pp.cb)pp.cb();},50);return{...pp,show:false,buf:"",temp:""};}
              return{...pp,buf:"",temp:"",err:"PINs did not match. Try again.",mode:"set-new",hint:"Choose a new PIN."};
            }
          });
        },120);
      }
      return{...p,buf,err:""};
    });
  };

  const changePin=()=>{setPinOk(false);localStorage.removeItem(PK);setPin({show:true,mode:"set-new",buf:"",temp:"",err:"",hint:"Choose a new PIN.",cb:()=>{setPinOk(true);setSec("credentials");toast_("PIN updated");}});};

  // Tasks
  const addTask=(cid,text)=>{if(!text.trim())return;setD(d=>({...d,clients:d.clients.map(c=>c.id===cid?{...c,tasks:[...c.tasks,{id:"t"+Date.now(),text:text.trim(),status:"pending"}]}:c)}));toast_("Task added");};
  const updTask=(cid,tid,status)=>setD(d=>({...d,clients:d.clients.map(c=>c.id===cid?{...c,tasks:c.tasks.map(t=>t.id===tid?{...t,status}:t)}:c)}));
  const delTask=(cid,tid)=>{setD(d=>({...d,clients:d.clients.map(c=>c.id===cid?{...c,tasks:c.tasks.filter(t=>t.id!==tid)}:c)}));toast_("Task removed");};

  // Notes
  const openNote=n=>{setNid(n.id);setNtitle(n.title);setNbody(n.content);};
  const onNC=(field,val)=>{
    if(field==="title")setNtitle(val);else setNbody(val);
    clearTimeout(ntRef.current);
    ntRef.current=setTimeout(()=>{
      const t=field==="title"?val:ntitle;
      const b=field==="body"?val:nbody;
      setD(d=>({...d,notes:d.notes.map(n=>n.id===nid?{...n,title:t,content:b,date:new Date().toISOString()}:n)}));
    },500);
  };
  const newNote=()=>{const id="n"+Date.now();const n={id,title:"",content:"",date:new Date().toISOString()};setD(d=>({...d,notes:[n,...d.notes]}));setNid(id);setNtitle("");setNbody("");};
  const delNote=()=>{setD(d=>({...d,notes:d.notes.filter(n=>n.id!==nid)}));setNid(null);setNtitle("");setNbody("");toast_("Note deleted");};

  // Export/import
  const exportAll=()=>{const b=new Blob([JSON.stringify(D,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="pier-backup-"+new Date().toISOString().slice(0,10)+".json";a.click();toast_("Exported");};
  const importAll=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!d.clients){toast_("Invalid file");return;}if(!d.creds)d.creds=[];setD(d);toast_("Import successful");}catch{toast_("Error reading file");}};r.readAsText(f);};

  const TITLES={overview:"Overview",clients:"Clients",calendar:"Calendar",vault:"Document Vault",links:"Links",notes:"Notes",credentials:"Credentials"};
  const NAVS=[
    {s:"overview",l:"Overview",i:"⚡",g:"Workspace"},
    {s:"clients",l:"Clients",i:"🏢"},
    {s:"calendar",l:"Calendar",i:"📅"},
    {s:"vault",l:"Document Vault",i:"🗂",g:"Resources"},
    {s:"links",l:"Links",i:"🔗"},
    {s:"notes",l:"Notes",i:"📝"},
    {s:"credentials",l:"Credentials",i:"🔐"},
  ];

  return (
    <>
      <style>{css}</style>
      <div className="app">
        <nav className="sb">
          <div className="sb-logo"><div className="sb-wm">Pier</div><div className="sb-tg">Connect with Pier</div></div>
          <div className="sb-nav">
            {NAVS.map(n=>(
              <div key={n.s}>
                {n.g&&<div className="sb-nl">{n.g}</div>}
                <button className={"sb-ni"+(sec===n.s?" act":"")} onClick={()=>n.s==="credentials"?goCreds():go(n.s)}>
                  <span style={{fontSize:15}}>{n.i}</span><span>{n.l}</span>
                </button>
              </div>
            ))}
          </div>
          <div className="sb-ft"><Clock/></div>
        </nav>

        <div className="main">
          <div className="tb">
            <div className="tb-title">{TITLES[sec]||sec}</div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {sec==="clients"&&<button className="btn btn-dk btn-sm" onClick={()=>setModal({id:"addClient"})}>+ Add Client</button>}
              {sec==="credentials"&&<button className="btn btn-ot btn-sm" onClick={changePin}>Change PIN</button>}
              {syncSt==="file"
                ?<div className="warn-bar">Host on GitHub to sync calendar</div>
                :<button className="btn btn-ot btn-sm" onClick={syncCal} disabled={syncSt==="syncing"} style={{opacity:syncSt==="syncing"?0.6:1}}>
                  <span className={syncSt==="syncing"?"spin":""}>🔄</span>
                  <span>{syncSt==="syncing"?"Syncing":syncSt==="synced"?"Synced":"Sync Calendar"}</span>
                </button>
              }
            </div>
          </div>

          <div className="content">
            {pin.show
              ? <PinScreen pin={pin} setPin={setPin} pinKey={pinKey}/>
              : sec==="overview"?<Overview D={D} go={go} cn={cn} setModal={setModal}/>
              : sec==="clients"?<Clients D={D} setD={setD} addTask={addTask} updTask={updTask} delTask={delTask} toast_={toast_}/>
              : sec==="calendar"?<Calendar D={D} setD={setD} cal={cal} setCal={setCal} setModal={setModal}/>
              : sec==="vault"?<Vault D={D} setD={setD} cn={cn} toast_={toast_} setModal={setModal} exportAll={exportAll} importAll={importAll}/>
              : sec==="links"?<Links D={D} setD={setD} cn={cn} toast_={toast_} setModal={setModal}/>
              : sec==="notes"?<Notes D={D} nid={nid} ntitle={ntitle} nbody={nbody} openNote={openNote} onNC={onNC} newNote={newNote} delNote={delNote}/>
              : sec==="credentials"?<Credentials D={D} setD={setD} cn={cn} toast_={toast_} setModal={setModal}/>
              : null
            }
          </div>
        </div>
      </div>

      {modal&&<Modal modal={modal} setModal={setModal} D={D} setD={setD} cal={cal} toast_={toast_}/>}
      {toast&&<div className="toast-bar">✓ {toast}</div>}
    </>
  );
}

function Clock(){
  const [n,setN]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setN(new Date()),30000);return()=>clearInterval(t);},[]);
  const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  return <>{days[n.getDay()]}<br/>{n.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}<br/>{n.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}</>;
}

            <div className="stat-v">{v}</div>
            <div className="stat-s">{s}</div>
            {l==="Total Clients"&&<button className="btn btn-dk btn-sm" onClick={()=>setModal({id:"addClient"})} style={{position:"absolute",top:12,right:12,fontSize:10.5}}>+ Add</button>}
          </div>
        ))}
      </div>
      <div className="two-col">
        <div className="card">
          <div className="card-hd"><span style={{fontWeight:700,fontSize:13}}>Today's Focus</span><button className="btn btn-ot btn-sm" onClick={()=>go("clients")}>All tasks</button></div>
          <div className="card-bd">
            {focus.length===0?<Empty icon="✅" text="All clear - no open tasks."/>:focus.map(t=>(
              <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid #f0ede9"}}>
                <span style={{fontSize:14}}>{t.ce}</span>
                <div style={{flex:1,fontSize:"12.5px",color:"#4a4845",lineHeight:1.3}}>{t.text}</div>
                <span className="badge" style={{background:SC[t.status].bg,color:SC[t.status].color}}>{SL[t.status]}</span>

function Clients({D,setD,addTask,updTask,delTask,toast_}){

function Calendar({D,setD,cal,setCal,setModal}){
  const {year,month,sel}=cal;
  const MN=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const today=new Date().toISOString().slice(0,10);
  const fd=new Date(year,month,1).getDay();
  const dim=new Date(year,month+1,0).getDate();
  const pd=new Date(year,month,0).getDate();
  const shift=d=>setCal(s=>{let m=s.month+d,y=s.year;if(m>11){m=0;y++;}else if(m<0){m=11;y--;}return{...s,month:m,year:y};});
  const CC={aw:"#2d7a5f",po:"#b85c1a",mt:"#2d5fa8",sj:"#7a4fb5",ve:"#c9a84c"};
  const days=[];
  for(let i=0;i<fd;i++)days.push({d:pd-fd+1+i,other:true});
  for(let d=1;d<=dim;d++){
    const ds=year+"-"+String(month+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    const evs=D.events.filter(e=>e.date===ds);
    const dot=evs.length>0?(evs[0].clientId?CC[evs[0].clientId]:"#c9a84c"):null;
    days.push({d,ds,isT:ds===today,isS:ds===sel,dot});
  }
  const rem=42-fd-dim;for(let d=1;d<=rem;d++)days.push({d,other:true});
  const sevs=D.events.filter(e=>e.date===sel).sort((a,b)=>a.time>b.time?1:-1);
  const lbl=sel?new Date(sel+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}):"Events";
  return(
    <div className="cal-wrap">
      <div className="card">
        <div className="card-bd">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <button className="btn btn-ot btn-sm" onClick={()=>shift(-1)}>&#8249;</button>
            <div style={{fontWeight:700,fontSize:16}}>{MN[month]} {year}</div>
            <button className="btn btn-ot btn-sm" onClick={()=>shift(1)}>&#8250;</button>
          </div>
          <div className="cal-grid">
            {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=><div key={d} className="cal-dl">{d}</div>)}
            {days.map((dy,i)=>(
              <div key={i} onClick={()=>dy.ds&&setCal(s=>({...s,sel:dy.ds}))}
                className={"cal-day"+(dy.other?" cal-other":dy.isS?" cal-sel":dy.isT?" cal-today":"")}
                style={{position:"relative"}}>
                {dy.d}
                {dy.dot&&!dy.other&&<span style={{position:"absolute",bottom:3,left:"50%",transform:"translateX(-50%)",width:4,height:4,borderRadius:"50%",background:dy.isS||dy.isT?"rgba(255,255,255,0.8)":dy.dot,display:"block"}}/>}
              </div>
            ))}
          </div>
        </div>
      </div>
      <div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:15}}>{lbl}</div>
          <button className="btn btn-dk btn-sm" onClick={()=>setModal({id:"addEvent",date:sel})}>+ Add Event</button>
        </div>
        {sevs.length===0?<Empty icon="📅" text="No events. Click a date then add one."/>:
          sevs.map(e=>{
            const CC2={aw:"#2d7a5f",po:"#b85c1a",mt:"#2d5fa8",sj:"#7a4fb5",ve:"#c9a84c"};
            const cn2={aw:"American Wellness",po:"Paw Origins",mt:"MT Global",sj:"Surfers Jewelry",ve:"Verinelle"};
            const cc=e.clientId?CC2[e.clientId]:null;
            const cname=e.clientId?cn2[e.clientId]:null;
            return(
              <div key={e.id} className="ev-item" style={{borderLeftColor:cc||"#c9a84c"}}>
                <div className="ev-time">{e.time||"--"}</div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{fontSize:13,fontWeight:600}}>{e.title}</div>
                    {cname&&<span style={{fontSize:9.5,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.7px",color:cc,background:cc+"18",padding:"1px 6px",borderRadius:20}}>{cname}</span>}
                    {e.fromGcal&&<span style={{fontSize:9,color:"#9a9693",background:"#f0ede9",padding:"1px 5px",borderRadius:10}}>gcal</span>}
                  </div>
                  {e.note&&<div style={{fontSize:11,color:"#9a9693",marginTop:1}}>{e.note}</div>}
                </div>
                {!e.fromGcal&&<button style={{background:"none",border:"none",cursor:"pointer",color:"#9a9693",fontSize:14,lineHeight:1}} onClick={()=>setD(d=>({...d,events:d.events.filter(ev=>ev.id!==e.id)}))}>✕</button>}
              </div>
            );
          })
        }
      </div>
    </div>
  );
}

        <>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
            <div style={{fontSize:13,color:"#9a9693"}}>{D.docs.length} saved link{D.docs.length!==1?"s":""}</div>
            <div style={{display:"flex",gap:8}}>
              <button className="btn btn-ot btn-sm" onClick={exportAll}>Export</button>
              <label className="btn btn-ot btn-sm" style={{cursor:"pointer"}}>Import<input type="file" accept=".json" onChange={importAll} style={{display:"none"}}/></label>
              <button className="btn btn-dk btn-sm" onClick={()=>setModal({id:"addDoc"})}>+ Add Link</button>
            </div>
          </div>
          {D.docs.length===0?<Empty icon="📌" text="No manual docs yet."/>:
            <div className="vg">
              {D.docs.map(d=>(
                <div key={d.id} className="vi">
                  <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
                    <div style={{fontSize:24}}>{d.icon}</div>
                    <div className="tag">{cn(d.client)}</div>
                  </div>
                  <div style={{fontWeight:700,fontSize:13.5}}>{d.title}</div>
                  <div style={{fontSize:11.5,color:"#9a9693",lineHeight:1.5,flex:1}}>{d.desc}</div>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:2}}>
                    <div style={{fontFamily:"monospace",fontSize:11,color:"#9a9693"}}>{d.date}</div>
                    <div style={{display:"flex",gap:6}}>
                      {d.url&&<a href={d.url} target="_blank" rel="noreferrer" className="btn btn-ot btn-sm">Open</a>}
                      <button className="btn btn-rd btn-sm" onClick={()=>setD(x=>({...x,docs:x.docs.filter(z=>z.id!==d.id)}))}>✕</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          }
        </>
      )}
    </>
  );
}

function Links({D,setD,cn,toast_,setModal}){
  const [open,setOpen]=useState({});
  const toggle=id=>setOpen(o=>({...o,[id]:o[id]===false?true:false}));
  const isOpen=id=>open[id]!==false;
  const allClients=[...D.clients,{id:"all",name:"General",emoji:"🔗",color:"#5a6476"}];
  return(
    <>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div style={{fontSize:13,color:"#9a9693"}}>{D.links.length} links across {allClients.length} folders</div>
        <button className="btn btn-dk btn-sm" onClick={()=>setModal({id:"addLink"})}>+ Add Link</button>
      </div>
      {allClients.map(c=>{
        const links=D.links.filter(l=>l.client===c.id);
        const open2=isOpen(c.id);
        return(
          <div key={c.id} className="folder">
            <div className="folder-hd" onClick={()=>toggle(c.id)}>
              <div className="folder-icon" style={{background:(c.color||"#5a6476")+"18"}}>{c.emoji}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:13.5,color:"#0f0e0d"}}>{c.name}</div>
                <div style={{fontSize:11,color:"#9a9693",marginTop:1}}>{links.length} link{links.length!==1?"s":""}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button className="btn btn-dk btn-sm" style={{fontSize:11,padding:"3px 9px"}} onClick={e=>{e.stopPropagation();setModal({id:"addLink",preClient:c.id});}}>+ Add</button>
                <span style={{color:"#9a9693",fontSize:14,display:"inline-block",transform:open2?"rotate(90deg)":"rotate(0deg)",transition:"transform 0.2s"}}>&#8250;</span>
              </div>
            </div>
            {open2&&(
              <div className="folder-body">
                {links.length===0
                  ?<div style={{padding:"12px 16px",fontSize:12.5,color:"#b0aba7",fontStyle:"italic"}}>No links yet - click + Add to save one.</div>
                  :links.map(l=>(
                    <div key={l.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",borderBottom:"1px solid #f0ede9",cursor:"pointer",transition:"background 0.12s"}}
                      onClick={()=>window.open(l.url,"_blank")}
                      onMouseEnter={e=>e.currentTarget.style.background="#faf9f7"}
                      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <div style={{fontSize:18,flexShrink:0}}>{l.emoji||"🔗"}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:600,color:"#0f0e0d",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{l.title}</div>
                        <div style={{fontSize:11,color:"#2d5fa8",marginTop:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{l.url}</div>
                      </div>
                      <button style={{background:"none",border:"none",cursor:"pointer",color:"#b0aba7",fontSize:13,padding:"2px 4px",borderRadius:3,lineHeight:1}} onClick={e=>{e.stopPropagation();setD(d=>({...d,links:d.links.filter(x=>x.id!==l.id)}));}} onMouseEnter={e=>e.currentTarget.style.color="#a83232"} onMouseLeave={e=>e.currentTarget.style.color="#b0aba7"}>✕</button>
                    </div>
                  ))
                }
              </div>
            )}
          </div>
        );
      })}
    </>
  );
}

function Notes({D,nid,ntitle,nbody,openNote,onNC,newNote,delNote}){
  return(
    <div className="nl">
      <div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:700,color:"#9a9693",textTransform:"uppercase",letterSpacing:"1px"}}>Notes</div>
          <button className="btn btn-dk btn-sm" onClick={newNote}>+</button>
        </div>
        {D.notes.length===0&&<div style={{fontSize:12,color:"#9a9693"}}>No notes yet.</div>}
        {D.notes.map(n=>(
          <div key={n.id} className={"ni"+(n.id===nid?" act":"")} onClick={()=>openNote(n)}>
            <div style={{fontSize:12.5,fontWeight:600,color:"#0f0e0d",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{n.title||"Untitled"}</div>
            <div style={{fontSize:11,color:"#9a9693",marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{(n.content||"").slice(0,55)}</div>
            <div style={{fontSize:10,color:"#b0aba7",marginTop:3,fontFamily:"monospace"}}>{new Date(n.date).toLocaleDateString()}</div>
          </div>
        ))}
      </div>
      <div className="card" style={{padding:20,display:"flex",flexDirection:"column",gap:8}}>
        <input value={ntitle} onChange={e=>onNC("title",e.target.value)} placeholder="Note title" style={{fontFamily:"inherit",fontSize:20,fontWeight:700,border:"none",outline:"none",background:"transparent",color:"#0f0e0d",width:"100%"}}/>
        <div style={{height:1,background:"#f0ede9"}}/>
        <textarea value={nbody} onChange={e=>onNC("body",e.target.value)} placeholder="Start writing..." style={{flex:1,border:"none",outline:"none",background:"transparent",color:"#4a4845",fontFamily:"inherit",fontSize:13.5,lineHeight:1.8,resize:"none",minHeight:300,padding:0}}/>
        {nid&&<div><button className="btn btn-rd btn-sm" onClick={delNote}>Delete note</button></div>}
      </div>
    </div>
  );
}

function Credentials({D,setD,cn,toast_,setModal}){
  const [shown,setShown]=useState({});
  const [search,setSearch]=useState("");
  const [open,setOpen]=useState({});
  const toggle=id=>setOpen(o=>({...o,[id]:o[id]===false?true:false}));
  const isOpen=id=>open[id]!==false;
  const copy=(t,l)=>navigator.clipboard.writeText(t).then(()=>toast_(l+" copied")).catch(()=>window.prompt("Copy:",t));
  const allClients=[...D.clients,{id:"all",name:"General",emoji:"🔗",color:"#5a6476"}];
  const filtered=search?D.creds.filter(cr=>cr.title.toLowerCase().includes(search.toLowerCase())||(cr.username||"").toLowerCase().includes(search.toLowerCase())||(cr.notes||"").toLowerCase().includes(search.toLowerCase())):null;
  return(
    <>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,gap:12,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:200}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search credentials..." className="inp" style={{flex:1,maxWidth:300}}/>
          {search&&<button onClick={()=>setSearch("")} style={{background:"none",border:"none",cursor:"pointer",color:"#9a9693",fontSize:13}}>✕</button>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{fontSize:13,color:"#9a9693"}}>{D.creds.length} credential{D.creds.length!==1?"s":""}</div>
          <button className="btn btn-dk btn-sm" onClick={()=>setModal({id:"addCred"})}>+ Add</button>
        </div>
      </div>
      {search?(
        filtered.length===0?<Empty icon="🔍" text={"No credentials match \""+search+"\""}/>:
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
          {filtered.map(cr=><CredCard key={cr.id} cr={cr} shown={shown} setShown={setShown} copy={copy} setD={setD}/>)}
        </div>
      ):(
        allClients.map(c=>{
          const creds=D.creds.filter(cr=>cr.client===c.id||(c.id==="all"&&!D.clients.find(cl=>cl.id===cr.client)));
          const op=isOpen(c.id);
          return(
            <div key={c.id} className="folder">
              <div className="folder-hd" onClick={()=>toggle(c.id)}>
                <div className="folder-icon" style={{background:(c.color||"#5a6476")+"18"}}>{c.emoji||"🔐"}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13.5,color:"#0f0e0d"}}>{c.name}</div>
                  <div style={{fontSize:11,color:"#9a9693",marginTop:1}}>{creds.length} credential{creds.length!==1?"s":""}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <button className="btn btn-dk btn-sm" style={{fontSize:11,padding:"3px 9px"}} onClick={e=>{e.stopPropagation();setModal({id:"addCred",preClient:c.id});}}>+ Add</button>
                  <span style={{color:"#9a9693",fontSize:14,display:"inline-block",transform:op?"rotate(90deg)":"rotate(0deg)",transition:"transform 0.2s"}}>&#8250;</span>
                </div>
              </div>
              {op&&(
                <div className="folder-body">
                  {creds.length===0
                    ?<div style={{padding:"12px 16px",fontSize:12.5,color:"#b0aba7",fontStyle:"italic"}}>No credentials yet - click + Add to save one.</div>
                    :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12,padding:14}}>
                      {creds.map(cr=><CredCard key={cr.id} cr={cr} shown={shown} setShown={setShown} copy={copy} setD={setD}/>)}
                    </div>
                  }
                </div>
              )}
            </div>
          );
        })
      )}
    </>
  );
}

function CredCard({cr,shown,setShown,copy,setD}){
  return(
    <div className="kc">
      <div>
        <div style={{fontWeight:700,fontSize:13.5,color:"#0f0e0d"}}>{cr.title}</div>
        {cr.url&&<a href={cr.url} target="_blank" rel="noreferrer" style={{fontSize:11,color:"#2d5fa8",wordBreak:"break-all"}}>{cr.url.replace(/^https?:\/\//,"").slice(0,40)}</a>}
      </div>
      <div className="kr"><div className="kl">User</div><div className="kv">{cr.username||"--"}</div><button className="kb" title="Copy" onClick={()=>copy(cr.username,"Username")}>&#9014;</button></div>
      <div className="kr">
        <div className="kl">Password</div>
        <div className="kv">{shown[cr.id]?cr.password:"**********"}</div>
        <button className="kb" title="Show/hide" onClick={()=>setShown(s=>({...s,[cr.id]:!s[cr.id]}))}>👁</button>
        <button className="kb" title="Copy" onClick={()=>copy(cr.password,"Password")}>&#9014;</button>
      </div>
      {cr.notes&&<div style={{fontSize:11.5,color:"#9a9693",fontStyle:"italic",lineHeight:1.5}}>{cr.notes}</div>}
      <div style={{display:"flex",justifyContent:"flex-end",borderTop:"1px solid #f0ede9",paddingTop:8,marginTop:2}}>
        <button className="btn btn-rd btn-sm" onClick={()=>{if(window.confirm("Delete this credential?"))setD(d=>({...d,creds:d.creds.filter(c=>c.id!==cr.id)}));}}>Remove</button>
      </div>
    </div>
  );
}

function Modal({modal,setModal,D,setD,cal,toast_}){
  const close=()=>setModal(null);
  const co=[{id:"all",name:"General"},...D.clients.map(c=>({id:c.id,name:c.name}))];
  const [f,setF]=useState({});
  const [showPw,setShowPw]=useState(false);
  useEffect(()=>{
    if(modal.date)setF({date:modal.date});
    else if(modal.preClient)setF({client:modal.preClient});
    else setF({});
    setShowPw(false);
  },[modal.id,modal.preClient,modal.date]);
  const set=(k,v)=>setF(x=>({...x,[k]:v}));
  const save=()=>{
    if(modal.id==="addEvent"){
      if(!f.title||!f.date){toast_("Title and date required");return;}
      setD(d=>({...d,events:[...d.events,{id:"ev"+Date.now(),title:f.title,date:f.date,time:f.time||"",note:f.note||""}]}));
      toast_("Event saved");
    }else if(modal.id==="addDoc"){
      if(!f.title)return;
      setD(d=>({...d,docs:[...d.docs,{id:"d"+Date.now(),title:f.title,client:f.client||"all",icon:f.icon||"📄",desc:f.desc||"",url:f.url||"",date:new Date().toISOString().slice(0,10)}]}));
      toast_("Document saved");
    }else if(modal.id==="addLink"){
      if(!f.title||!f.url){toast_("Title and URL required");return;}
      setD(d=>({...d,links:[...d.links,{id:"l"+Date.now(),title:f.title,url:f.url,client:f.client||modal.preClient||"all",emoji:f.emoji||"🔗"}]}));
      toast_("Link saved");
    }else if(modal.id==="addClient"){
      if(!f.name)return;
      setD(d=>({...d,clients:[...d.clients,{id:"c"+Date.now(),name:f.name,niche:f.niche||"--",role:f.role||"--",emoji:f.emoji||"🏢",color:f.color||"#c9a84c",tasks:[]}]}));
      toast_("Client added - appears in all tabs automatically");
    }else if(modal.id==="addCred"){
      if(!f.title){toast_("Label required");return;}
      setD(d=>({...d,creds:[...d.creds,{id:"cr"+Date.now(),title:f.title,client:f.client||modal.preClient||"all",username:f.username||"",password:f.password||"",url:f.url||"",notes:f.notes||""}]}));
      toast_("Credential saved");
    }
    close();
  };
  const TT={addEvent:"Add Event",addDoc:"Add Document",addLink:"Add Link",addClient:"Add Client",addCred:"Add Credential"};
  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&close()}>
      <div className="modal">
        <div className="modal-hd"><div style={{fontSize:17,fontWeight:700}}>{TT[modal.id]||""}</div><button onClick={close} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#9a9693",padding:"2px 6px",borderRadius:4}}>✕</button></div>
        <div className="modal-bd">
          {modal.id==="addEvent"&&<>
            <div className="fg"><label className="fl">Title</label><input className="inp" style={{width:"100%"}} placeholder="Meeting with client..." value={f.title||""} onChange={e=>set("title",e.target.value)}/></div>
            <div className="fg"><label className="fl">Date</label><input type="date" className="inp" style={{width:"100%"}} value={f.date||""} onChange={e=>set("date",e.target.value)}/></div>
            <div className="fg"><label className="fl">Time</label><input type="time" className="inp" style={{width:"100%"}} value={f.time||""} onChange={e=>set("time",e.target.value)}/></div>
            <div className="fg"><label className="fl">Note</label><input className="inp" style={{width:"100%"}} placeholder="Optional" value={f.note||""} onChange={e=>set("note",e.target.value)}/></div>
          </>}
          {modal.id==="addDoc"&&<>
            <div className="fg"><label className="fl">Title</label><input className="inp" style={{width:"100%"}} placeholder="Onboarding SOP..." value={f.title||""} onChange={e=>set("title",e.target.value)}/></div>
            <div className="fg"><label className="fl">Client</label><select className="fsel" style={{width:"100%"}} value={f.client||"all"} onChange={e=>set("client",e.target.value)}>{co.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
            <div className="fg"><label className="fl">Type</label><select className="fsel" style={{width:"100%"}} value={f.icon||"📄"} onChange={e=>set("icon",e.target.value)}><option value="📄">Document</option><option value="📊">Spreadsheet</option><option value="📋">SOP</option><option value="📁">Folder</option><option value="📝">Notes</option></select></div>
            <div className="fg"><label className="fl">Description</label><textarea className="fta" style={{width:"100%"}} placeholder="What is this?" value={f.desc||""} onChange={e=>set("desc",e.target.value)}/></div>
            <div className="fg"><label className="fl">URL</label><input className="inp" style={{width:"100%"}} placeholder="https://..." value={f.url||""} onChange={e=>set("url",e.target.value)}/></div>
          </>}
          {modal.id==="addLink"&&<>
            <div className="fg"><label className="fl">Label</label><input className="inp" style={{width:"100%"}} placeholder="Dashboard..." value={f.title||""} onChange={e=>set("title",e.target.value)}/></div>
            <div className="fg"><label className="fl">URL</label><input className="inp" style={{width:"100%"}} placeholder="https://..." value={f.url||""} onChange={e=>set("url",e.target.value)}/></div>
            <div className="fg"><label className="fl">Client</label><select className="fsel" style={{width:"100%"}} value={f.client||modal.preClient||"all"} onChange={e=>set("client",e.target.value)}>{co.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
            <div className="fg"><label className="fl">Emoji</label><input className="inp" style={{width:"100%"}} placeholder="🔗" maxLength={2} value={f.emoji||""} onChange={e=>set("emoji",e.target.value)}/></div>
          </>}
          {modal.id==="addClient"&&<>
            <div className="fg"><label className="fl">Client Name</label><input className="inp" style={{width:"100%"}} placeholder="Brand name..." value={f.name||""} onChange={e=>set("name",e.target.value)}/></div>
            <div className="fg"><label className="fl">Niche</label><input className="inp" style={{width:"100%"}} placeholder="Fashion Ecommerce..." value={f.niche||""} onChange={e=>set("niche",e.target.value)}/></div>
            <div className="fg"><label className="fl">Your Role</label><input className="inp" style={{width:"100%"}} placeholder="CS Manager..." value={f.role||""} onChange={e=>set("role",e.target.value)}/></div>
            <div className="fg"><label className="fl">Emoji</label><input className="inp" style={{width:"100%"}} placeholder="🏢" maxLength={2} value={f.emoji||""} onChange={e=>set("emoji",e.target.value)}/></div>
            <div className="fg"><label className="fl">Color</label><input type="color" className="inp" style={{width:"100%",height:40,padding:"4px 8px"}} value={f.color||"#c9a84c"} onChange={e=>set("color",e.target.value)}/></div>
            <div style={{fontSize:12,color:"#9a9693",background:"#f0ede9",padding:"8px 12px",borderRadius:8}}>New client will appear automatically in Clients, Links, Credentials, and Document Vault.</div>
          </>}
          {modal.id==="addCred"&&<>
            <div className="fg"><label className="fl">Label / Platform</label><input className="inp" style={{width:"100%"}} placeholder="Gorgias, Shopify, Gmail..." value={f.title||""} onChange={e=>set("title",e.target.value)}/></div>
            <div className="fg"><label className="fl">Client</label><select className="fsel" style={{width:"100%"}} value={f.client||modal.preClient||"all"} onChange={e=>set("client",e.target.value)}>{co.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
            <div className="fg"><label className="fl">Username / Email</label><input className="inp" style={{width:"100%"}} placeholder="user@example.com" value={f.username||""} onChange={e=>set("username",e.target.value)}/></div>
            <div className="fg"><label className="fl">Password</label>
              <div style={{display:"flex",gap:7}}>
                <input type={showPw?"text":"password"} className="inp" style={{flex:1}} placeholder="Password" value={f.password||""} onChange={e=>set("password",e.target.value)}/>
                <button type="button" className="btn btn-ot btn-sm" onClick={()=>setShowPw(p=>!p)}>{showPw?"Hide":"Show"}</button>
              </div>
            </div>
            <div className="fg"><label className="fl">URL (optional)</label><input className="inp" style={{width:"100%"}} placeholder="https://app.gorgias.com" value={f.url||""} onChange={e=>set("url",e.target.value)}/></div>
            <div className="fg"><label className="fl">Notes (optional)</label><textarea className="fta" style={{width:"100%",minHeight:60}} placeholder="2FA on phone, admin access..." value={f.notes||""} onChange={e=>set("notes",e.target.value)}/></div>
          </>}
        </div>
        <div className="modal-ft">
          <button className="btn btn-ot" onClick={close}>Cancel</button>
          <button className="btn btn-dk" onClick={save}>Save</button>
        </div>
      </div>
    </div>
  );
}

function Empty({icon,text}){
  return(
    <div style={{textAlign:"center",padding:"36px 16px",color:"#9a9693"}}>
      <div style={{fontSize:32,marginBottom:8}}>{icon}</div>
      <div style={{fontSize:13}}>{text}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
