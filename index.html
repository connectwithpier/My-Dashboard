<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pier — Connect with Pier</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0f0e0d;--ink-soft:#4a4845;--ink-faint:#9a9693;--surface:#faf9f7;--surface-raised:#ffffff;--border:#e8e5e1;--border-subtle:#f0ede9;--gold:#c9a84c;--gold-dim:#e8d9b0;--gold-glow:rgba(201,168,76,0.12);--green:#2d7a5f;--green-bg:#eaf4f0;--blue:#2d5fa8;--blue-bg:#eaeff8;--amber:#b85c1a;--amber-bg:#faf0e8;--red:#a83232;--red-bg:#faeaea;--slate:#5a6476;--slate-bg:#eef0f4;--radius:12px;--radius-sm:8px;--shadow:0 1px 3px rgba(15,14,13,.06),0 4px 16px rgba(15,14,13,.04);--shadow-lg:0 8px 32px rgba(15,14,13,.10),0 2px 8px rgba(15,14,13,.06);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--surface);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.6;}
.app{display:flex;min-height:100vh;}
.sidebar{width:220px;min-width:220px;background:var(--ink);display:flex;flex-direction:column;padding:28px 0 24px;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sidebar-logo{padding:0 24px 28px;border-bottom:1px solid rgba(255,255,255,.08);}
.wordmark{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;letter-spacing:-.3px;}
.tagline{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;font-weight:500;}
.sidebar-nav{padding:20px 12px;flex:1;}
.nav-label{font-size:10px;text-transform:uppercase;letter-spacing:1.8px;color:rgba(255,255,255,.3);padding:0 12px;margin-bottom:6px;margin-top:16px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:rgba(255,255,255,.6);cursor:pointer;font-size:13.5px;font-weight:500;transition:all .15s;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff;}
.nav-item.active{background:var(--gold-glow);color:var(--gold);}
.nav-icon{font-size:16px;width:20px;text-align:center;}
.sidebar-footer{padding:16px 24px 0;border-top:1px solid rgba(255,255,255,.08);}
.sidebar-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.35);line-height:1.8;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--surface-raised);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.topbar-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--ink);letter-spacing:-.3px;}
.topbar-actions{display:flex;gap:10px;align-items:center;}
.content{padding:32px;flex:1;overflow-y:auto;}
.section{display:none;}.section.active{display:block;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:'Inter',sans-serif;}
.btn-primary{background:var(--ink);color:#fff;}.btn-primary:hover{background:#2a2927;}
.btn-gold{background:var(--gold);color:#fff;}.btn-gold:hover{background:#b8973a;}
.btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--border);}.btn-ghost:hover{background:var(--border-subtle);}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid #f0c8c8;}.btn-danger:hover{background:#f5d5d5;}
.btn-sm{padding:5px 11px;font-size:12px;}
.card{background:var(--surface-raised);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);}
.card-header{padding:18px 20px 14px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.card-title{font-weight:600;font-size:14px;color:var(--ink);display:flex;align-items:center;gap:8px;}
.card-body{padding:16px 20px;}
.status-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:500;}
.s-pending{background:var(--amber-bg);color:var(--amber);}.s-inprogress{background:var(--blue-bg);color:var(--blue);}.s-completed{background:var(--green-bg);color:var(--green);}.s-stopped{background:var(--slate-bg);color:var(--slate);}
.overview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.stat-card{background:var(--surface-raised);border:1px solid var(--border);border-radius:12px;padding:18px 20px;box-shadow:var(--shadow);}
.stat-label{font-size:11.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.8px;font-weight:500;}
.stat-value{font-family:'DM Serif Display',serif;font-size:32px;color:var(--ink);margin-top:4px;letter-spacing:-1px;}
.stat-sub{font-size:12px;color:var(--ink-faint);margin-top:2px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;}
.client-card{background:var(--surface-raised);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .2s;}
.client-card:hover{box-shadow:var(--shadow-lg);}
.client-header{padding:16px 18px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.client-meta{flex:1;}
.client-name{font-family:'DM Serif Display',serif;font-size:17px;letter-spacing:-.2px;color:var(--ink);}
.client-role{font-size:12px;color:var(--ink-faint);margin-top:2px;}
.client-niche{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-top:4px;}
.client-dot{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.client-tasks{padding:0 18px 6px;}
.task-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border-subtle);}
.task-row:last-child{border-bottom:none;}
.task-text{flex:1;font-size:13px;color:var(--ink-soft);line-height:1.4;}
.task-done{text-decoration:line-through;color:var(--ink-faint);}
.task-stopped{color:var(--ink-faint);font-style:italic;}
.task-sel{font-size:11px;padding:3px 6px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;color:var(--ink-soft);outline:none;flex-shrink:0;max-width:110px;}
.task-del{background:none;border:none;cursor:pointer;color:var(--ink-faint);font-size:14px;padding:2px 4px;border-radius:4px;transition:all .1s;flex-shrink:0;}
.task-del:hover{background:var(--red-bg);color:var(--red);}
.add-task-row{padding:10px 18px 14px;display:flex;gap:8px;}
.task-input{flex:1;padding:7px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;color:var(--ink);background:var(--surface);outline:none;transition:border-color .15s;}
.task-input:focus{border-color:var(--gold);}
.task-input::placeholder{color:var(--ink-faint);}
.client-footer{padding:10px 18px 14px;display:flex;gap:8px;align-items:center;border-top:1px solid var(--border-subtle);}
.cal-layout{display:grid;grid-template-columns:340px 1fr;gap:20px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dl{text-align:center;font-size:11px;font-weight:600;color:var(--ink-faint);padding:6px 0;text-transform:uppercase;letter-spacing:.5px;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;cursor:pointer;color:var(--ink-soft);transition:all .15s;position:relative;}
.cal-day:hover{background:var(--border-subtle);}
.cal-today{background:var(--ink);color:#fff;font-weight:600;}
.cal-sel{background:var(--gold);color:#fff;}
.cal-other{color:var(--ink-faint);}
.cal-dot::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--gold);}
.cal-today.cal-dot::after{background:var(--gold-dim);}
.event-list{display:flex;flex-direction:column;gap:10px;}
.event-item{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;border-left:3px solid var(--gold);}
.event-time{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold);font-weight:500;white-space:nowrap;}
.event-body{flex:1;}
.event-title{font-size:13.5px;font-weight:500;color:var(--ink);}
.event-meta{font-size:12px;color:var(--ink-faint);margin-top:2px;}
.event-del{background:none;border:none;cursor:pointer;color:var(--ink-faint);font-size:14px;padding:2px;border-radius:4px;}
.event-del:hover{color:var(--red);}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-nav-title{font-family:'DM Serif Display',serif;font-size:18px;}
.cal-nav-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;cursor:pointer;font-size:14px;color:var(--ink-soft);}
.cal-nav-btn:hover{background:var(--border-subtle);}
.vault-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.vault-item{background:var(--surface-raised);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:8px;transition:box-shadow .2s;}
.vault-item:hover{box-shadow:var(--shadow-lg);}
.vault-top{display:flex;align-items:flex-start;justify-content:space-between;}
.vault-icon{font-size:24px;}
.client-tag{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);background:var(--gold-glow);padding:2px 8px;border-radius:20px;}
.vault-title{font-size:14px;font-weight:600;color:var(--ink);}
.vault-desc{font-size:12px;color:var(--ink-faint);line-height:1.5;}
.vault-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-faint);}
.links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.link-item{background:var(--surface-raised);border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow);display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:box-shadow .2s;}
.link-item:hover{box-shadow:var(--shadow-lg);}
.link-emoji{font-size:22px;flex-shrink:0;}
.link-body{flex:1;min-width:0;}
.link-title{font-size:13.5px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.link-url{font-size:12px;color:var(--blue);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.link-client{font-size:11px;color:var(--ink-faint);margin-top:2px;}
.link-del{background:none;border:none;cursor:pointer;color:var(--ink-faint);font-size:14px;padding:2px;border-radius:4px;flex-shrink:0;}
.link-del:hover{color:var(--red);}
.notes-layout{display:grid;grid-template-columns:240px 1fr;gap:20px;height:calc(100vh - 180px);}
.notes-list{display:flex;flex-direction:column;gap:4px;overflow-y:auto;}
.note-item{padding:10px 12px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.note-item:hover{background:var(--border-subtle);}
.note-item.active{background:var(--gold-glow);border-color:var(--gold-dim);}
.note-item-title{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-item-preview{font-size:11.5px;color:var(--ink-faint);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-item-date{font-size:11px;color:var(--ink-faint);margin-top:3px;font-family:'JetBrains Mono',monospace;}
.note-title-inp{font-family:'DM Serif Display',serif;font-size:24px;border:none;outline:none;background:transparent;color:var(--ink);letter-spacing:-.3px;padding:0;width:100%;}
.note-title-inp::placeholder{color:var(--border);}
.note-body-inp{flex:1;border:none;outline:none;background:transparent;color:var(--ink-soft);font-family:'Inter',sans-serif;font-size:14px;line-height:1.8;resize:none;min-height:300px;padding:0;}
.note-body-inp::placeholder{color:var(--border);}
.creds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
.cred-card{background:var(--surface-raised);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px;transition:box-shadow .2s;}
.cred-card:hover{box-shadow:var(--shadow-lg);}
.cred-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.cred-title{font-size:14px;font-weight:600;color:var(--ink);}
.cred-row{display:flex;align-items:center;gap:8px;}
.cred-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-faint);width:72px;flex-shrink:0;}
.cred-val{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--ink-soft);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cred-copy{background:none;border:none;cursor:pointer;font-size:13px;color:var(--ink-faint);padding:2px 5px;border-radius:4px;transition:all .1s;flex-shrink:0;}
.cred-copy:hover{background:var(--border-subtle);color:var(--ink);}
.cred-eye{background:none;border:none;cursor:pointer;font-size:13px;color:var(--ink-faint);padding:2px 5px;border-radius:4px;flex-shrink:0;}
.cred-eye:hover{color:var(--gold);}
.cred-notes{font-size:12px;color:var(--ink-faint);font-style:italic;line-height:1.5;}
.cred-actions{display:flex;gap:6px;justify-content:flex-end;border-top:1px solid var(--border-subtle);padding-top:8px;margin-top:2px;}
.pin-overlay{position:fixed;inset:0;background:var(--ink);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;}
.pin-overlay.hidden{display:none;}
.pin-logo{font-family:'DM Serif Display',serif;font-size:28px;color:#fff;letter-spacing:-.5px;}
.pin-sub{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px;margin-top:-16px;}
.pin-prompt{font-size:14px;color:rgba(255,255,255,.6);}
.pin-dots{display:flex;gap:12px;}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,.3);transition:all .15s;}
.pin-dot.filled{background:var(--gold);border-color:var(--gold);}
.pin-pad{display:grid;grid-template-columns:repeat(3,64px);gap:10px;}
.pin-key{width:64px;height:64px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#fff;font-size:20px;font-family:'DM Serif Display',serif;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.pin-key:hover{background:rgba(255,255,255,.12);border-color:var(--gold);}
.pin-err{font-size:13px;color:#f28b82;min-height:20px;}
.pin-hint{font-size:13px;color:rgba(255,255,255,.45);text-align:center;max-width:260px;line-height:1.6;}
.modal-overlay{position:fixed;inset:0;background:rgba(15,14,13,.5);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:24px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface-raised);border-radius:12px;box-shadow:var(--shadow-lg);width:100%;max-width:480px;border:1px solid var(--border);overflow:hidden;}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'DM Serif Display',serif;font-size:18px;}
.modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--ink-faint);padding:2px 6px;border-radius:4px;}
.modal-close:hover{color:var(--ink);}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:14px;}
.modal-footer{padding:14px 24px;border-top:1px solid var(--border-subtle);display:flex;justify-content:flex-end;gap:10px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fl{font-size:12px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px;}
.fi,.fs,.ft{padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13.5px;font-family:'Inter',sans-serif;color:var(--ink);background:var(--surface);outline:none;transition:border-color .15s;}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--gold);}
.ft{resize:vertical;min-height:80px;line-height:1.6;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:12px 18px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);z-index:200;transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:8px;}
.toast.show{transform:translateY(0);opacity:1;}
.empty{text-align:center;padding:40px 20px;color:var(--ink-faint);}
.empty .ei{font-size:36px;margin-bottom:10px;}
.empty p{font-size:13.5px;}
.row{display:flex;align-items:center;gap:8px;}
.tf{color:var(--ink-faint);font-size:13px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
@media(max-width:900px){.sidebar{width:60px;min-width:60px;}.sidebar-logo,.nav-label,.nav-item span,.sidebar-footer{display:none;}.nav-item{justify-content:center;}.overview-grid{grid-template-columns:repeat(2,1fr);}.cal-layout,.notes-layout{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="app">
<nav class="sidebar">
  <div class="sidebar-logo"><div class="wordmark">Pier</div><div class="tagline">Connect with Pier</div></div>
  <div class="sidebar-nav">
    <div class="nav-label">Workspace</div>
    <button class="nav-item active" data-sec="overview" onclick="go('overview')"><span class="nav-icon">⚡</span><span>Overview</span></button>
    <button class="nav-item" data-sec="clients" onclick="go('clients')"><span class="nav-icon">🏢</span><span>Clients</span></button>
    <button class="nav-item" data-sec="calendar" onclick="go('calendar')"><span class="nav-icon">📅</span><span>Calendar</span></button>
    <div class="nav-label">Resources</div>
    <button class="nav-item" data-sec="vault" onclick="go('vault')"><span class="nav-icon">🗂</span><span>Document Vault</span></button>
    <button class="nav-item" data-sec="links" onclick="go('links')"><span class="nav-icon">🔗</span><span>Links</span></button>
    <button class="nav-item" data-sec="notes" onclick="go('notes')"><span class="nav-icon">📝</span><span>Notes</span></button>
    <button class="nav-item" data-sec="credentials" onclick="goCreds()"><span class="nav-icon">🔐</span><span>Credentials</span></button>
  </div>
  <div class="sidebar-footer"><div class="sidebar-date" id="clock"></div></div>
</nav>
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="pageTitle">Overview</div>
    <div class="topbar-actions" id="pageActions"></div>
  </div>
  <div class="content">

    <div id="sec-overview" class="section active">
      <div class="overview-grid" id="statsGrid"></div>
      <div class="two-col">
        <div class="card">
          <div class="card-header"><div class="card-title">⚡ Today's Focus</div><button class="btn btn-ghost btn-sm" onclick="go('clients')">All tasks →</button></div>
          <div class="card-body" id="focusEl"></div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">📅 Upcoming Meetings</div><button class="btn btn-ghost btn-sm" onclick="go('calendar')">Calendar →</button></div>
          <div class="card-body" id="meetEl"></div>
        </div>
      </div>
    </div>

    <div id="sec-clients" class="section">
      <div class="clients-grid" id="clientsGrid"></div>
    </div>

    <div id="sec-calendar" class="section">
      <div class="cal-layout">
        <div class="card">
          <div class="card-body">
            <div class="cal-nav">
              <button class="cal-nav-btn" onclick="calShift(-1)">&#8249;</button>
              <div class="cal-nav-title" id="calHead"></div>
              <button class="cal-nav-btn" onclick="calShift(1)">&#8250;</button>
            </div>
            <div class="cal-grid" id="calGrid"></div>
          </div>
        </div>
        <div>
          <div class="row" style="justify-content:space-between;margin-bottom:16px">
            <div style="font-family:'DM Serif Display',serif;font-size:18px" id="calDayLabel">Events</div>
            <button class="btn btn-primary btn-sm" onclick="openM('addEvent')">+ Add Event</button>
          </div>
          <div class="event-list" id="eventList"></div>
        </div>
      </div>
    </div>

    <div id="sec-vault" class="section">
      <div class="row" style="justify-content:space-between;margin-bottom:24px">
        <div class="tf" id="vaultCount"></div>
        <div class="row gap-2">
          <button class="btn btn-ghost btn-sm" onclick="exportAll()">&#8595; Export</button>
          <label class="btn btn-ghost btn-sm" style="cursor:pointer">&#8593; Import<input type="file" accept=".json" onchange="importAll(event)" style="display:none"></label>

<script>
// ── STATE ─────────────────────────────────────
const SK = 'pier_v3', PK = 'pier_pin';
function load(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):null;}catch{return null;}}
function save(){localStorage.setItem(SK,JSON.stringify(D));}

const DEF = {
  clients:[
    {id:'aw',name:'American Wellness',niche:"Doctor's Office",role:'Phone Receptionist',emoji:'🏥',color:'#2d7a5f',tasks:[{id:'t1',text:'Review call log from yesterday',status:'pending'},{id:'t2',text:'Update patient callback scripts',status:'inprogress'}]},
    {id:'po',name:'Paw Origins',niche:'CBD Pet Products',role:'CS Manager & EA',emoji:'🐾',color:'#b85c1a',tasks:[{id:'t3',text:'Draft weekly status report',status:'pending'},{id:'t4',text:'Answer product FAQ tickets',status:'inprogress'}]},
    {id:'mt',name:'MT Global',niche:'Fashion Ecommerce',role:'CS Manager (4 VAs)',emoji:'👗',color:'#2d5fa8',tasks:[{id:'t5',text:'Review VA performance this week',status:'pending'},{id:'t6',text:'Check KPI dashboard metrics',status:'completed'},{id:'t7',text:'Send Dinili escalation report',status:'inprogress'}]},
    {id:'sj',name:'Surfers Jewelry',niche:'Jewelry',role:'CS Manager',emoji:'💎',color:'#7a4fb5',tasks:[{id:'t8',text:'Confirm inventory dashboard is live',status:'inprogress'},{id:'t9',text:'Check Ecommerce stock levels',status:'pending'}]},
    {id:'ve',name:'Verinelle',niche:'Fashion Ecommerce',role:'CS Manager (Onboarding)',emoji:'✨',color:'#c9a84c',tasks:[{id:'t10',text:'Complete onboarding checklist',status:'inprogress'},{id:'t11',text:'Set up ticket workflow SOP',status:'pending'},{id:'t12',text:'Define KPI baselines',status:'pending'}]}
  ],
  events:[],
  docs:[
    {id:'d1',title:'MT Global KPI Dashboard',client:'mt',icon:'📊',desc:'Live analytics for Dinili & Montanello.',url:'',date:'2025-06-01'},
    {id:'d2',title:'Surfers Jewelry Inventory',client:'sj',icon:'📊',desc:'GitHub Pages inventory dashboard.',url:'https://connectwithpier.github.io/Surfers-Jewelry-Inventory-Levels/',date:'2025-06-01'},
    {id:'d3',title:'VA Escalation Policy',client:'mt',icon:'📋',desc:'SOP for escalating tickets beyond VA level.',url:'',date:'2025-05-15'}
  ],
  links:[
    {id:'l1',title:'MT Global Dashboard',url:'#',client:'mt',emoji:'📊'},
    {id:'l2',title:'Surfers Jewelry Inventory',url:'https://connectwithpier.github.io/Surfers-Jewelry-Inventory-Levels/',client:'sj',emoji:'💎'},
    {id:'l3',title:'Google Drive',url:'https://drive.google.com',client:'all',emoji:'📁'}
  ],
  notes:[
    {id:'n1',title:'Apps Script Gotchas',content:'Every code change requires redeploying as "New version" under Manage Deployments.\n\nBound script: Extensions → Apps Script from within the sheet.\n\nAuthorize via authorize() helper.',date:new Date().toISOString()},
    {id:'n2',title:'Onboarding Verinelle',content:'Still in onboarding stage.\n- Set up communication channels\n- Document SOP\n- Define ticket workflow\n- Set KPI baselines\n- 30-day milestones',date:new Date().toISOString()}
  ],
  creds:[]
};

const D = load() || JSON.parse(JSON.stringify(DEF));
if(!D.creds) D.creds = [];

// ── NAVIGATION ────────────────────────────────
let curSec = 'overview';
let credsOk = false;

const TITLES = {overview:'Overview',clients:'Clients',calendar:'Calendar',vault:'Document Vault',links:'Links',notes:'Notes',credentials:'Credentials'};

function go(sec) {
  if(sec !== 'credentials') credsOk = false;
  curSec = sec;
  document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const secEl = document.getElementById('sec-' + sec);
  if(secEl) secEl.classList.add('active');
  const navEl = document.querySelector('[data-sec="' + sec + '"]');
  if(navEl) navEl.classList.add('active');
  document.getElementById('pageTitle').textContent = TITLES[sec] || sec;
  setActions(sec);
  if(sec==='overview') drawOverview();
  else if(sec==='clients') drawClients();
  else if(sec==='calendar') drawCal();
  else if(sec==='vault') drawVault();
  else if(sec==='links') drawLinks();
  else if(sec==='notes') drawNotes();
  else if(sec==='credentials') drawCreds();
}

function setActions(sec) {
  const el = document.getElementById('pageActions');
  if(sec==='clients') el.innerHTML = '<button class="btn btn-primary btn-sm" onclick="openM(\'addClient\')">+ Add Client</button>';
  else if(sec==='credentials') el.innerHTML = '<button class="btn btn-ghost btn-sm" onclick="changePin()">&#128273; Change PIN</button>';
  else el.innerHTML = '';
}

// ── OVERVIEW ──────────────────────────────────
function sLabel(s){return {pending:'Pending',inprogress:'In Progress',completed:'Completed',stopped:'On Hold'}[s]||s;}

function drawOverview() {
  const all = D.clients.flatMap(c=>c.tasks);
  const p=all.filter(t=>t.status==='pending').length, ip=all.filter(t=>t.status==='inprogress').length, done=all.filter(t=>t.status==='completed').length;
  document.getElementById('statsGrid').innerHTML =
    `<div class="stat-card"><div class="stat-label">Total Clients</div><div class="stat-value">${D.clients.length}</div><div class="stat-sub">Active engagements</div></div>
     <div class="stat-card"><div class="stat-label">Open Tasks</div><div class="stat-value">${p+ip}</div><div class="stat-sub">${p} pending · ${ip} in progress</div></div>
     <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value">${done}</div><div class="stat-sub">Tasks done</div></div>
     <div class="stat-card"><div class="stat-label">Documents</div><div class="stat-value">${D.docs.length}</div><div class="stat-sub">${D.links.length} saved links</div></div>`;
  const focus = D.clients.flatMap(c=>c.tasks.filter(t=>t.status==='pending'||t.status==='inprogress').map(t=>({...t,cn:c.name,ce:c.emoji}))).slice(0,6);
  document.getElementById('focusEl').innerHTML = focus.length===0
    ? '<div class="empty"><div class="ei">✅</div><p>All clear — no open tasks.</p></div>'
    : focus.map(t=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border-subtle)"><span>${t.ce}</span><div style="flex:1;font-size:13px;color:var(--ink-soft)">${t.text}</div><span class="status-badge s-${t.status}">${sLabel(t.status)}</span></div>`).join('');
  const now=new Date();
  const up=D.events.filter(e=>new Date(e.date+'T'+(e.time||'00:00'))>=now).sort((a,b)=>a.date+a.time>b.date+b.time?1:-1).slice(0,4);
  document.getElementById('meetEl').innerHTML = up.length===0
    ? '<div class="empty"><div class="ei">📅</div><p>No upcoming meetings.</p></div>'
    : up.map(e=>`<div class="event-item"><div class="event-time">${e.date}<br>${e.time||''}</div><div class="event-body"><div class="event-title">${e.title}</div>${e.note?`<div class="event-meta">${e.note}</div>`:''}</div></div>`).join('');
}

// ── CLIENTS ───────────────────────────────────
function drawClients() {
  document.getElementById('clientsGrid').innerHTML = D.clients.map(c=>`
    <div class="client-card">
      <div class="client-header">
        <div class="client-meta">
          <div class="row" style="gap:6px">
            <div class="client-name">${c.name}</div>
            <button style="background:none;border:none;cursor:pointer;color:var(--ink-faint);font-size:13px;padding:2px 5px;border-radius:4px" onclick="editCName('${c.id}')">&#9998;</button>
          </div>
          <div class="client-role">${c.role}</div>
          <div class="client-niche">${c.niche}</div>
        </div>
        <div class="client-dot" style="background:${c.color}22">${c.emoji}</div>
      </div>
      <div class="client-tasks">${c.tasks.length===0
        ? '<div style="padding:8px 0;color:var(--ink-faint);font-size:13px">No tasks yet.</div>'
        : c.tasks.map(t=>`<div class="task-row">
            <div class="task-text ${t.status==='completed'?'task-done':t.status==='stopped'?'task-stopped':''}">${t.text}</div>
            <select class="task-sel" onchange="updTask('${c.id}','${t.id}',this.value)">
              <option value="pending" ${t.status==='pending'?'selected':''}>Pending</option>
              <option value="inprogress" ${t.status==='inprogress'?'selected':''}>In Progress</option>
              <option value="completed" ${t.status==='completed'?'selected':''}>Completed</option>
              <option value="stopped" ${t.status==='stopped'?'selected':''}>On Hold</option>
            </select>
            <button class="task-del" onclick="delTask('${c.id}','${t.id}')">&#10005;</button>
          </div>`).join('')}
      </div>
      <div class="add-task-row">
        <input class="task-input" id="nt${c.id}" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTask('${c.id}')">
        <button class="btn btn-gold btn-sm" onclick="addTask('${c.id}')">Add</button>
      </div>
      <div class="client-footer">
        <button class="btn btn-danger btn-sm" onclick="delClient('${c.id}')">Remove client</button>
      </div>
    </div>`).join('');
}

function addTask(cid){const el=document.getElementById('nt'+cid),t=el.value.trim();if(!t)return;D.clients.find(c=>c.id===cid).tasks.push({id:'t'+Date.now(),text:t,status:'pending'});el.value='';save();drawClients();toast('Task added');}
function updTask(cid,tid,st){D.clients.find(c=>c.id===cid).tasks.find(t=>t.id===tid).status=st;save();drawClients();}
function delTask(cid,tid){const c=D.clients.find(c=>c.id===cid);c.tasks=c.tasks.filter(t=>t.id!==tid);save();drawClients();toast('Task removed');}
function editCName(cid){const c=D.clients.find(c=>c.id===cid);const n=prompt('Client name:',c.name);if(n&&n.trim()){c.name=n.trim();save();drawClients();}}
function delClient(cid){if(!confirm('Remove this client?'))return;D.clients=D.clients.filter(c=>c.id!==cid);save();drawClients();toast('Client removed');}
function saveClient(){
  const name=document.getElementById('ncName').value.trim();if(!name)return;
  D.clients.push({id:'c'+Date.now(),name,niche:document.getElementById('ncNiche').value.trim()||'—',role:document.getElementById('ncRole').value.trim()||'—',emoji:document.getElementById('ncEmoji').value.trim()||'🏢',color:document.getElementById('ncColor').value||'#c9a84c',tasks:[]});
  save();closeM('addClient');go('clients');toast('Client added');
}

// ── CALENDAR ──────────────────────────────────
let cY,cM,cSel;
function drawCal(){const n=new Date();if(cY===undefined){cY=n.getFullYear();cM=n.getMonth();cSel=n.toISOString().slice(0,10);}drawCalGrid();drawEvents();}
function drawCalGrid(){
  const mn=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calHead').textContent=mn[cM]+' '+cY;
  const fd=new Date(cY,cM,1).getDay(),td=new Date(cY,cM+1,0).getDate(),pd=new Date(cY,cM,0).getDate(),today=new Date().toISOString().slice(0,10);
  let h=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-dl">${d}</div>`).join('');
  for(let i=0;i<fd;i++){h+=`<div class="cal-day cal-other">${pd-fd+1+i}</div>`;}
  for(let d=1;d<=td;d++){
    const ds=`${cY}-${String(cM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasDot=D.events.some(e=>e.date===ds);
    const cls=(ds===cSel?'cal-sel':ds===today?'cal-today')+' '+(hasDot?'cal-dot':'');
    h+=`<div class="cal-day ${cls}" onclick="cPickDay('${ds}')">${d}</div>`;
  }
  const rem=42-fd-td;for(let d=1;d<=rem;d++)h+=`<div class="cal-day cal-other">${d}</div>`;
  document.getElementById('calGrid').innerHTML=h;
}
function cPickDay(ds){cSel=ds;drawCalGrid();drawEvents();document.getElementById('evDate').value=ds;}
function calShift(d){cM+=d;if(cM>11){cM=0;cY++;}else if(cM<0){cM=11;cY--;}drawCalGrid();}
function drawEvents(){
  const lbl=cSel?new Date(cSel+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}):'Events';
  document.getElementById('calDayLabel').textContent=lbl;
  const evs=cSel?D.events.filter(e=>e.date===cSel).sort((a,b)=>a.time>b.time?1:-1):D.events;
  document.getElementById('eventList').innerHTML=evs.length===0
    ?'<div class="empty"><div class="ei">📅</div><p>No events for this day.</p></div>'
    :evs.map(e=>`<div class="event-item"><div class="event-time">${e.time||'—'}</div><div class="event-body"><div class="event-title">${e.title}</div>${e.note?`<div class="event-meta">${e.note}</div>`:''}</div><button class="event-del" onclick="delEv('${e.id}')">&#10005;</button></div>`).join('');
}
function saveEvent(){
  const ti=document.getElementById('evTitle').value.trim(),da=document.getElementById('evDate').value;
  if(!ti||!da){toast('Title and date required');return;}
  D.events.push({id:'ev'+Date.now(),title:ti,date:da,time:document.getElementById('evTime').value,note:document.getElementById('evNote').value.trim()});
  save();closeM('addEvent');drawCalGrid();drawEvents();toast('Event saved');
  ['evTitle','evTime','evNote'].forEach(id=>document.getElementById(id).value='');
}
function delEv(id){D.events=D.events.filter(e=>e.id!==id);save();drawCalGrid();drawEvents();}

// ── VAULT ─────────────────────────────────────
function cName(id){return D.clients.find(c=>c.id===id)?.name||'General';}
function drawVault(){
  document.getElementById('vaultCount').textContent=`${D.docs.length} document${D.docs.length!==1?'s':''}`;
  document.getElementById('vaultGrid').innerHTML=D.docs.length===0
    ?'<div class="empty"><div class="ei">🗂</div><p>No documents yet.</p></div>'
    :D.docs.map(d=>`<div class="vault-item"><div class="vault-top"><div class="vault-icon">${d.icon}</div><div class="client-tag">${cName(d.client)}</div></div><div class="vault-title">${d.title}</div><div class="vault-desc">${d.desc||''}</div><div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:4px"><div class="vault-date">${d.date||''}</div><div style="display:flex;gap:6px">${d.url?`<a href="${d.url}" target="_blank" class="btn btn-ghost btn-sm">Open &#8599;</a>`:''}<button class="btn btn-danger btn-sm" onclick="delDoc('${d.id}')">&#10005;</button></div></div></div>`).join('');
}
function saveDoc(){
  const ti=document.getElementById('docTitle').value.trim();if(!ti)return;
  D.docs.push({id:'d'+Date.now(),title:ti,client:document.getElementById('docClient').value,icon:document.getElementById('docType').value,desc:document.getElementById('docDesc').value.trim(),url:document.getElementById('docUrl').value.trim(),date:new Date().toISOString().slice(0,10)});
  save();closeM('addDoc');drawVault();toast('Document saved');
  ['docTitle','docDesc','docUrl'].forEach(id=>document.getElementById(id).value='');
}
function delDoc(id){D.docs=D.docs.filter(d=>d.id!==id);save();drawVault();}
function exportAll(){const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`pier-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();toast('Exported');}
function importAll(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!d.clients){toast('Invalid file');return;}Object.assign(D,d);if(!D.creds)D.creds=[];save();go(curSec);toast('Import successful');}catch{toast('Error reading file');}};r.readAsText(f);}

// ── LINKS ─────────────────────────────────────
function drawLinks(){
  document.getElementById('linksCount').textContent=`${D.links.length} saved link${D.links.length!==1?'s':''}`;
  document.getElementById('linksGrid').innerHTML=D.links.length===0
    ?'<div class="empty"><div class="ei">🔗</div><p>No links yet.</p></div>'
    :D.links.map(l=>`<div class="link-item" onclick="window.open('${l.url}','_blank')"><div class="link-emoji">${l.emoji||'🔗'}</div><div class="link-body"><div class="link-title">${l.title}</div><div class="link-url">${l.url}</div><div class="link-client">${cName(l.client)}</div></div><button class="link-del" onclick="event.stopPropagation();delLink('${l.id}')">&#10005;</button></div>`).join('');
}
function saveLink(){
  const ti=document.getElementById('lnkTitle').value.trim(),url=document.getElementById('lnkUrl').value.trim();
  if(!ti||!url){toast('Title and URL required');return;}
  D.links.push({id:'l'+Date.now(),title:ti,url,client:document.getElementById('lnkClient').value,emoji:document.getElementById('lnkEmoji').value.trim()||'🔗'});
  save();closeM('addLink');drawLinks();toast('Link saved');
  ['lnkTitle','lnkUrl','lnkEmoji'].forEach(id=>document.getElementById(id).value='');
}
function delLink(id){D.links=D.links.filter(l=>l.id!==id);save();drawLinks();}

// ── NOTES ─────────────────────────────────────
let curNote=null,ntTimer=null;
function drawNotes(){
  document.getElementById('notesList').innerHTML=D.notes.length===0
    ?'<div style="padding:12px;color:var(--ink-faint);font-size:13px">No notes yet.</div>'
    :D.notes.map(n=>`<div class="note-item ${n.id===curNote?'active':''}" onclick="openNote('${n.id}')"><div class="note-item-title">${n.title||'Untitled'}</div><div class="note-item-preview">${(n.content||'').slice(0,60)}</div><div class="note-item-date">${new Date(n.date).toLocaleDateString()}</div></div>`).join('');
  if(!curNote&&D.notes.length>0) openNote(D.notes[0].id);
  else if(curNote) loadNoteEd(curNote);
}
function openNote(id){curNote=id;drawNotes();loadNoteEd(id);}
function loadNoteEd(id){const n=D.notes.find(n=>n.id===id);if(!n)return;document.getElementById('nTitle').value=n.title||'';document.getElementById('nBody').value=n.content||'';document.getElementById('nMeta').textContent=`Last updated ${new Date(n.date).toLocaleString()}`;}
function saveNote(){
  if(!curNote)return;clearTimeout(ntTimer);
  ntTimer=setTimeout(()=>{const n=D.notes.find(n=>n.id===curNote);if(!n)return;n.title=document.getElementById('nTitle').value;n.content=document.getElementById('nBody').value;n.date=new Date().toISOString();save();document.getElementById('nMeta').textContent='Saved just now';drawNotes();},600);
}
function newNote(){const id='n'+Date.now();D.notes.unshift({id,title:'',content:'',date:new Date().toISOString()});save();curNote=id;drawNotes();document.getElementById('nTitle').focus();}
function delNote(){if(!curNote||!confirm('Delete this note?'))return;D.notes=D.notes.filter(n=>n.id!==curNote);curNote=null;save();drawNotes();document.getElementById('nTitle').value='';document.getElementById('nBody').value='';toast('Note deleted');}

// ── PIN + CREDENTIALS ─────────────────────────
let pBuf='',pMode='unlock',pTemp='',pCb=null;
const gPin=()=>localStorage.getItem(PK)||null;
const sPin=p=>localStorage.setItem(PK,p);

function goCreds(){if(credsOk){go('credentials');return;}const pin=gPin();showPin(pin?'unlock':'set-new',()=>{credsOk=true;go('credentials');});}
function showPin(mode,cb){
  pMode=mode;pBuf='';pTemp='';pCb=cb;
  document.getElementById('pinOverlay').classList.remove('hidden');
  updDots();document.getElementById('pinErr').textContent='';
  const prompts={unlock:'Enter your PIN to unlock','set-new':'Create a 4-digit PIN','confirm-new':'Confirm your PIN'};
  const hints={unlock:'','set-new':'First-time setup. This protects your credentials.','confirm-new':'Enter the same PIN again.'};
  document.getElementById('pinPrompt').textContent=prompts[mode]||'';
  document.getElementById('pinHint').textContent=hints[mode]||'';
}
function closePinOverlay(){document.getElementById('pinOverlay').classList.add('hidden');pBuf='';updDots();}
function updDots(){for(let i=0;i<4;i++)document.getElementById('pd'+i).classList.toggle('filled',i<pBuf.length);}
function pk(k){if(pBuf.length>=4)return;pBuf+=k;updDots();document.getElementById('pinErr').textContent='';if(pBuf.length===4)setTimeout(procPin,120);}
function pbk(){pBuf=pBuf.slice(0,-1);updDots();}
function procPin(){
  if(pMode==='unlock'){
    if(pBuf===gPin()){closePinOverlay();if(pCb)pCb();}
    else{document.getElementById('pinErr').textContent='Incorrect PIN. Try again.';pBuf='';updDots();}
  }else if(pMode==='set-new'){
    pTemp=pBuf;pBuf='';showPin('confirm-new',pCb);
  }else if(pMode==='confirm-new'){
    if(pBuf===pTemp){sPin(pBuf);closePinOverlay();toast('PIN set');if(pCb)pCb();}
    else{document.getElementById('pinErr').textContent="PINs didn't match.";pTemp='';pBuf='';updDots();setTimeout(()=>showPin('set-new',pCb),900);}
  }
}
function changePin(){credsOk=false;localStorage.removeItem(PK);showPin('set-new',()=>{credsOk=true;go('credentials');toast('PIN updated');});}

function drawCreds(){
  document.getElementById('credsCount').textContent=`${D.creds.length} saved credential${D.creds.length!==1?'s':''}`;
  document.getElementById('credsGrid').innerHTML=D.creds.length===0
    ?'<div class="empty"><div class="ei">🔐</div><p>No credentials yet.</p></div>'
    :D.creds.map(cr=>`<div class="cred-card">
      <div class="cred-top"><div><div class="cred-title">${cr.title}</div>${cr.url?`<a href="${cr.url}" target="_blank" style="font-size:11.5px;color:var(--blue)">${cr.url.replace(/^https?:\/\//,'').slice(0,40)}</a>`:''}</div><div class="client-tag">${cName(cr.client)}</div></div>
      <div class="cred-row"><div class="cred-lbl">User</div><div class="cred-val">${cr.username}</div><button class="cred-copy" onclick="cp('${escAttr(cr.username)}','Username')">&#9014;</button></div>
      <div class="cred-row"><div class="cred-lbl">Password</div><div class="cred-val" id="cpw${cr.id}" data-pw="${escAttr(cr.password)}" data-shown="false">&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;</div><button class="cred-eye" onclick="tPw('${cr.id}')">&#128065;</button><button class="cred-copy" onclick="cp(document.getElementById('cpw${cr.id}').dataset.pw,'Password')">&#9014;</button></div>
      ${cr.notes?`<div class="cred-notes">${cr.notes}</div>`:''}
      <div class="cred-actions"><button class="btn btn-danger btn-sm" onclick="delCred('${cr.id}')">Remove</button></div>
    </div>`).join('');
}
function escAttr(s){return (s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function tPw(id){const el=document.getElementById('cpw'+id);const shown=el.dataset.shown==='true';el.textContent=shown?'••••••••':el.dataset.pw;el.dataset.shown=shown?'false':'true';}
function cp(text,label){navigator.clipboard.writeText(text).then(()=>toast(label+' copied')).catch(()=>prompt('Copy:',text));}
function toggleCredPw(){const i=document.getElementById('crPass'),b=document.getElementById('crPwBtn');if(i.type==='password'){i.type='text';b.textContent='Hide';}else{i.type='password';b.textContent='Show';}}
function saveCred(){
  const ti=document.getElementById('crTitle').value.trim();if(!ti){toast('Label required');return;}
  D.creds.push({id:'cr'+Date.now(),title:ti,client:document.getElementById('crClient').value,username:document.getElementById('crUser').value.trim(),password:document.getElementById('crPass').value,url:document.getElementById('crUrl').value.trim(),notes:document.getElementById('crNotes').value.trim()});
  save();closeM('addCred');drawCreds();
  ['crTitle','crUser','crPass','crUrl','crNotes'].forEach(id=>document.getElementById(id).value='');
  toast('Credential saved');
}
function delCred(id){if(!confirm('Delete this credential?'))return;D.creds=D.creds.filter(c=>c.id!==id);save();drawCreds();toast('Removed');}

// ── MODALS ────────────────────────────────────
function fillSelects(){
  const opts='<option value="all">All Clients</option>'+D.clients.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  ['docClient','lnkClient','crClient'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=opts;});
}
function openM(id){fillSelects();if(id==='addEvent'&&cSel)document.getElementById('evDate').value=cSel;document.getElementById('modal-'+id).classList.add('open');}
function closeM(id){document.getElementById('modal-'+id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));

// ── TOAST ─────────────────────────────────────
let tTimer;
function toast(msg){const el=document.getElementById('toast');el.innerHTML='&#10003; '+msg;el.classList.add('show');clearTimeout(tTimer);tTimer=setTimeout(()=>el.classList.remove('show'),2400);}

// ── CLOCK ─────────────────────────────────────
function tick(){const n=new Date(),days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];document.getElementById('clock').innerHTML=days[n.getDay()]+'<br>'+n.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+'<br>'+n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}
tick();setInterval(tick,30000);

// ── BOOT ──────────────────────────────────────
drawOverview();
</script>
</body>
</html>
