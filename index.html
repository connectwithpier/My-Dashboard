function App(){
  const[data,setData]=useState(()=>{const s=loadData();if(s){if(!s.creds)s.creds=[];return s;}return JSON.parse(JSON.stringify(DEFAULTS));});
  const[sec,setSec]=useState("overview");
  const[ok,setOk]=useState(false);
  const[toast,setToast]=useState(null);
  const[modal,setModal]=useState(null);
  const[pin,setPin]=useState({show:false,mode:"unlock",buf:"",temp:"",err:"",hint:"",cb:null});
  const[cal,setCal]=useState(()=>{const n=new Date();return{year:n.getFullYear(),month:n.getMonth(),sel:n.toISOString().slice(0,10)};});
  const[nid,setNid]=useState(null);
  const[syncStatus,setSyncStatus]=useState("idle"); // idle | syncing | synced | error
  const syncRef=useRef(null);
  const[ntitle,setNtitle]=useState("");
  const[nbody,setNbody]=useState("");
  const ntRef=useRef(null);
  const ttRef=useRef(null);

  useEffect(()=>{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));},[data]);

  // Auto-sync Google Calendar on load + every 30 min
  useEffect(()=>{
    const doSync = () => syncGoogleCalendar(setData, toast_, setSyncStatus);
    doSync();
    syncRef.current = setInterval(doSync, 30 * 60 * 1000);
    return () => clearInterval(syncRef.current);
  }, []);

  const toast_=useCallback(msg=>{setToast(msg);clearTimeout(ttRef.current);ttRef.current=setTimeout(()=>setToast(null),2400);},[]);
  const cn=id=>data.clients.find(c=>c.id===id)?.name||"General";

  const go=s=>{
    if(s!=="credentials")setOk(false);
    setSec(s);
    if(s==="notes"&&!nid&&data.notes.length>0){const n=data.notes[0];setNid(n.id);setNtitle(n.title);setNbody(n.content);}
  };

  const goCreds=()=>{
    if(ok){go("credentials");return;}
    const sp=localStorage.getItem(PIN_KEY);
    if(!sp)setPin({show:true,mode:"set-new",buf:"",temp:"",err:"",hint:"Choose a 4-digit PIN to protect your credentials.",cb:()=>{setOk(true);setSec("credentials");}});
    else setPin({show:true,mode:"unlock",buf:"",temp:"",err:"",hint:"",cb:()=>{setOk(true);setSec("credentials");}});
  };

  const pinKey=k=>{
    setPin(p=>{
      if(p.buf.length>=4)return p;
      const buf=p.buf+k;
      if(buf.length===4){
        setTimeout(()=>{
          setPin(pp=>{
            const{mode,temp,cb}=pp;
            const stored=localStorage.getItem(PIN_KEY);
            if(mode==="unlock"){
              if(buf===stored){setTimeout(()=>{if(pp.cb)pp.cb();},50);return{...pp,show:false,buf:""};}
              return{...pp,buf:"",err:"Incorrect PIN. Try again."};
            }else if(mode==="set-new"){
              return{...pp,buf:"",temp:buf,mode:"confirm-new",err:"",hint:"Enter the same PIN again to confirm."};
            }else{
              if(buf===temp){localStorage.setItem(PIN_KEY,buf);setTimeout(()=>{toast_("PIN set successfully");if(pp.cb)pp.cb();},50);return{...pp,show:false,buf:"",temp:""};}
              return{...pp,buf:"",temp:"",err:"PINs didn't match. Try again.",mode:"set-new",hint:"Choose a new 4-digit PIN."};
            }
          });
        },120);
      }
      return{...p,buf,err:""};
    });
  };

  const changePin=()=>{setOk(false);localStorage.removeItem(PIN_KEY);setPin({show:true,mode:"set-new",buf:"",temp:"",err:"",hint:"Choose a new PIN.",cb:()=>{setOk(true);setSec("credentials");toast_("PIN updated");}});};
  const addTask=(cid,text)=>{if(!text.trim())return;setData(d=>({...d,clients:d.clients.map(c=>c.id===cid?{...c,tasks:[...c.tasks,{id:"t"+Date.now(),text:text.trim(),status:"pending"}]}:c)}));toast_("Task added");};
  const updTask=(cid,tid,status)=>setData(d=>({...d,clients:d.clients.map(c=>c.id===cid?{...c,tasks:c.tasks.map(t=>t.id===tid?{...t,status}:t)}:c)}));
  const delTask=(cid,tid)=>{setData(d=>({...d,clients:d.clients.map(c=>c.id===cid?{...c,tasks:c.tasks.filter(t=>t.id!==tid)}:c)}));toast_("Task removed");};
  const openNote=n=>{setNid(n.id);setNtitle(n.title);setNbody(n.content);};
  const onNC=(f,v)=>{if(f==="title")setNtitle(v);else setNbody(v);clearTimeout(ntRef.current);ntRef.current=setTimeout(()=>{const t=f==="title"?v:ntitle;const b=f==="body"?v:nbody;setData(d=>({...d,notes:d.notes.map(n=>n.id===nid?{...n,title:t,content:b,date:new Date().toISOString()}:n)}));},500);};
  const newNote=()=>{const id="n"+Date.now();const n={id,title:"",content:"",date:new Date().toISOString()};setData(d=>({...d,notes:[n,...d.notes]}));setNid(id);setNtitle("");setNbody("");};
  const delNote=()=>{setData(d=>({...d,notes:d.notes.filter(n=>n.id!==nid)}));setNid(null);setNtitle("");setNbody("");toast_("Note deleted");};
  const exportAll=()=>{const b=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="pier-backup-"+new Date().toISOString().slice(0,10)+".json";a.click();toast_("Exported successfully");};

  const navs=[

        <div className="ptb">
          <div className="ptt">{titles[sec]}</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {sec==="clients"&&<button className="btn bdk bsm" onClick={()=>setModal({id:"addClient"})}>+ Add Client</button>}
            {sec==="credentials"&&<button className="btn bot bsm" onClick={changePin}>🔑 Change PIN</button>}
            <button
              className="btn bot bsm"

           sec==="calendar"?<Ca data={data} setData={setData} cal={cal} setCal={setCal} setModal={setModal}/>:
           sec==="vault"?<Va data={data} setData={setData} cn={cn} toast_={toast_} setModal={setModal} exportAll={exportAll} importAll={importAll}/>:
           sec==="links"?<Li data={data} setData={setData} cn={cn} toast_={toast_} setModal={setModal}/>:
           sec==="notes"?<No data={data} nid={nid} ntitle={ntitle} nbody={nbody} openNote={openNote} onNC={onNC} newNote={newNote} delNote={delNote}/>:
           sec==="credentials"?<Kr data={data} setData={setData} cn={cn} toast_={toast_} setModal={setModal}/>:null

  </>);
}

function Clock(){
  const[n,sn]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>sn(new Date()),30000);return()=>clearInterval(t);},[]);
  const d=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  return<>{d[n.getDay()]}<br/>{n.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}<br/>{n.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}</>;
}

        </div>
      </div>

        <div className="crdh"><span style={{fontWeight:700,fontSize:13}}>📅 Upcoming Meetings</span><button className="btn bot bsm" onClick={()=>go("calendar")}>Calendar →</button></div>
        <div className="crdb">
          {up.length===0?<Emp icon="📅" text="No upcoming meetings scheduled."/>:up.map(e=>{
            const clientColors={"aw":"#2d7a5f","po":"#b85c1a","mt":"#2d5fa8","sj":"#7a4fb5","ve":"#c9a84c"};

function Ca({data,setData,cal,setCal,setModal}){
  const{year,month,sel}=cal;
  const mn=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const today=new Date().toISOString().slice(0,10);
  const fd=new Date(year,month,1).getDay(),dim=new Date(year,month+1,0).getDate(),pd=new Date(year,month,0).getDate();
  const shift=d=>{setCal(s=>{let m=s.month+d,y=s.year;if(m>11){m=0;y++;}else if(m<0){m=11;y--;}return{...s,month:m,year:y};});};
  const days=[];
  for(let i=0;i<fd;i++)days.push({d:pd-fd+1+i,other:true});
  for(let d=1;d<=dim;d++){const ds=year+"-"+String(month+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");days.push({d,ds,isT:ds===today,isS:ds===sel,dot:data.events.some(e=>e.date===ds)});}
  const rem=42-fd-dim;for(let d=1;d<=rem;d++)days.push({d,other:true});
  const sevs=data.events.filter(e=>e.date===sel).sort((a,b)=>a.time>b.time?1:-1);
  const lbl=sel?new Date(sel+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}):"Events";
  return(<div className="cln">
    <div className="crd"><div className="crdb">
      <div className="cnv">
        <button className="cnb" onClick={()=>shift(-1)}>‹</button>
        <div style={{fontWeight:700,fontSize:16}}>{mn[month]} {year}</div>
        <button className="cnb" onClick={()=>shift(1)}>›</button>
      </div>
      <div className="cdg">
        {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=><div key={d} className="cdl">{d}</div>)}
        {days.map((dy,i)=>{
          const dayEvents = dy.ds ? data.events.filter(e=>e.date===dy.ds) : [];
          const clientColors={"aw":"#2d7a5f","po":"#b85c1a","mt":"#2d5fa8","sj":"#7a4fb5","ve":"#c9a84c"};
          const dotColor = dayEvents.length>0 ? (dayEvents[0].clientId ? clientColors[dayEvents[0].clientId] : "#c9a84c") : null;
          return(<div key={i} onClick={()=>dy.ds&&setCal(s=>({...s,sel:dy.ds}))}
            className={"cd"+(dy.other?" cdo":dy.isS?" cds":dy.isT?" cdt":"")}
            style={dotColor&&!dy.isS&&!dy.other?{position:"relative"}:{}}>
            {dy.d}
            {dotColor&&!dy.other&&<span style={{position:"absolute",bottom:3,left:"50%",transform:"translateX(-50%)",width:4,height:4,borderRadius:"50%",background:dy.isS||dy.isT?"rgba(255,255,255,0.8)":dotColor,display:"block"}}/>}
          </div>);
        })}
      </div>
    </div></div>
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:15}}>{lbl}</div>
        <button className="btn bdk bsm" onClick={()=>setModal({id:"addEvent",date:sel})}>+ Add Event</button>
      </div>
      {sevs.length===0?<Emp icon="📅" text="No events for this day. Click a date then + Add Event."/>:
        sevs.map(e=>{
          const clientColors={"aw":"#2d7a5f","po":"#b85c1a","mt":"#2d5fa8","sj":"#7a4fb5","ve":"#c9a84c"};
          const clientNames={"aw":"American Wellness","po":"Paw Origins","mt":"MT Global","sj":"Surfers Jewelry","ve":"Verinelle"};
          const cc = e.clientId ? clientColors[e.clientId] : null;
          const cn = e.clientId ? clientNames[e.clientId] : null;
          return(<div key={e.id} className="ei" style={{borderLeftColor: cc||"#c9a84c"}}>
            <div className="et">{e.time||"—"}</div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{fontSize:13,fontWeight:600}}>{e.title}</div>
                {cn&&<span style={{fontSize:9.5,fontWeight:700,textTransform:"uppercase",letterSpacing:".7px",color:cc,background:cc+"18",padding:"1px 6px",borderRadius:20}}>{cn}</span>}
                {e.fromGcal&&<span style={{fontSize:9,color:"#9a9693",background:"#f0ede9",padding:"1px 5px",borderRadius:10}}>gcal</span>}
              </div>
              {e.note&&<div style={{fontSize:11,color:"#9a9693",marginTop:1}}>{e.note}</div>}
            </div>
            {!e.fromGcal&&<button style={{background:"none",border:"none",cursor:"pointer",color:"#9a9693",fontSize:14,lineHeight:1}} onClick={()=>setData(d=>({...d,events:d.events.filter(ev=>ev.id!==e.id)}))}>✕</button>}
          </div>);
        })
      }
    </div>
  </div>);
}

// ── GOOGLE CALENDAR SYNC ──────────────────────────────────────────

const CAL_CLIENT_MAP = {
  "connectwithpier@gmail.com": null,
  "piersurfersjewelry@gmail.com": "sj",
  "pier.verinelle@gmail.com": "ve",
  "en.philippines#holiday@group.v.calendar.google.com": null
};

const CAL_IDS = [
  "connectwithpier@gmail.com",
  "piersurfersjewelry@gmail.com",
  "pier.verinelle@gmail.com"
];

async function syncGoogleCalendar(setData, toast_, setSyncStatus) {
  setSyncStatus("syncing");
  try {
    const now = new Date();
    const start = now.toISOString();
    const end = new Date(now.getTime() + 30 * 24 * 60 * 60 * 1000).toISOString();

    const calList = CAL_IDS.map(id => ({ id, client: CAL_CLIENT_MAP[id] || null }));

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 2000,
        system: "You are a calendar sync assistant. Fetch events from multiple Google calendars using the list_events tool for each calendar ID provided. Return ONLY a valid JSON array with NO markdown, NO explanation, NO code fences. Each event object must have exactly these fields: id (string), title (string), date (YYYY-MM-DD string), time (HH:MM 24h string, empty string if all-day), note (string, empty if none), calendarId (string - the calendar ID it came from). Deduplicate by event id. If no events, return [].",
        messages: [{ role: "user", content: "Fetch all upcoming events from " + start + " to " + end + " from these calendars: " + calList.map(c => c.id).join(", ") + ". Call list_events once per calendar ID. Return a flat JSON array of all events across all calendars, each including the calendarId field." }],
        mcp_servers: [{ type: "url", url: "https://calendarmcp.googleapis.com/mcp/v1", name: "google-calendar" }]
      })
    });

    if (!response.ok) throw new Error("API error " + response.status);
    const data = await response.json();

    const text = data.content
      .filter(b => b.type === "text")
      .map(b => b.text)
      .join("");

    const clean = text.replace(/```json|```/g, "").trim();
    const events = JSON.parse(clean);
    if (!Array.isArray(events)) throw new Error("Bad format");

    setData(d => {
      const manual = d.events.filter(e => !e.fromGcal);
      const seen = new Set();
      const gcalEvents = events
        .filter(e => { if(seen.has(e.id)) return false; seen.add(e.id); return true; })
        .map(e => ({
          id: "gcal-" + e.id,
          title: e.title,
          date: e.date,
          time: e.time || "",
          note: e.note || "",
          fromGcal: true,
          calendarId: e.calendarId || null,
          clientId: CAL_CLIENT_MAP[e.calendarId] || null
        }));
      return { ...d, events: [...manual, ...gcalEvents] };
    });

    setSyncStatus("synced");
    toast_("Synced " + events.length + " event" + (events.length !== 1 ? "s" : "") + " across " + CAL_IDS.length + " calendars");
    localStorage.setItem("pier_gcal_last_sync", new Date().toISOString());
  } catch(err) {
    console.error("Calendar sync error:", err);
    setSyncStatus("error");
    toast_("Calendar sync failed — check connection");
  }
}
